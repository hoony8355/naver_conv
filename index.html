<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>네이버 광고 전환 보정 도구</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f7; color: #1a1a18; padding: 2rem; }
.wrap { max-width: 760px; margin: 0 auto; }
.header { margin-bottom: 1.5rem; }
.header h2 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
.header p { font-size: 13px; color: #666; }
.upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.upload-box { border: 1.5px dashed #ccc; border-radius: 12px; padding: 1.25rem; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
.upload-box:hover { border-color: #888; background: #f1f1ef; }
.upload-box.ready { border-style: solid; border-color: #1D9E75; background: #E1F5EE; }
.upload-box label { font-size: 12px; font-weight: 500; color: #888; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
.upload-box.ready label { color: #0F6E56; }
.upload-box .filename { font-size: 13px; color: #1a1a18; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.upload-box.ready .filename { color: #085041; }
.upload-box .hint { font-size: 12px; color: #aaa; margin-top: 4px; }
.upload-box.ready .hint { color: #0F6E56; }
input[type=file] { display: none; }
.run-btn { width: 100%; padding: 10px; font-size: 14px; font-weight: 500; border-radius: 8px; border: none; background: #1D9E75; color: white; cursor: pointer; transition: background 0.15s, opacity 0.15s; }
.run-btn:hover:not(:disabled) { background: #0F6E56; }
.run-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.result-box { margin-top: 16px; border: 0.5px solid #e0e0dc; border-radius: 12px; overflow: hidden; background: white; }
.result-header { padding: 10px 14px; background: #f5f5f2; border-bottom: 0.5px solid #e0e0dc; display: flex; align-items: center; justify-content: space-between; }
.result-header span { font-size: 13px; font-weight: 500; }
.dl-btn { font-size: 12px; padding: 5px 12px; border-radius: 8px; background: #1D9E75; color: white; border: none; cursor: pointer; font-weight: 500; }
.dl-btn:hover { background: #0F6E56; }
.table-wrap { overflow-x: auto; max-height: 320px; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { position: sticky; top: 0; background: #f5f5f2; padding: 8px 10px; text-align: left; font-weight: 500; color: #666; border-bottom: 0.5px solid #e0e0dc; white-space: nowrap; }
td { padding: 7px 10px; border-bottom: 0.5px solid #e0e0dc; white-space: nowrap; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f9f9f7; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 12px 14px; background: white; border-bottom: 0.5px solid #e0e0dc; }
.stat { background: #f5f5f2; border-radius: 8px; padding: 10px 12px; }
.stat-label { font-size: 11px; color: #888; margin-bottom: 4px; }
.stat-val { font-size: 16px; font-weight: 500; }
.stat-val.green { color: #0F6E56; }
.stat-val.red { color: #993C1D; }
.msg { font-size: 13px; padding: 10px 14px; color: #888; }
.error-msg { font-size: 13px; padding: 10px 14px; color: #993C1D; }
.tag { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 99px; font-weight: 500; margin-left: 4px; }
.tag-changed { background: #FAEEDA; color: #854F0B; }
.tag-same { background: #f1f1ef; color: #aaa; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h2>네이버 광고 전환 보정 도구</h2>
    <p>전환유형별 파일의 구매완료 데이터만 추출해 전체 데이터를 보정합니다</p>
  </div>

  <div class="upload-grid">
    <div class="upload-box" id="box1" onclick="document.getElementById('f1').click()">
      <label>전체 데이터</label>
      <div class="filename" id="name1">파일을 클릭해 선택</div>
      <div class="hint" id="hint1">캠페인유형 + 일별 + 전환수/매출액 포함</div>
      <input type="file" id="f1" accept=".csv" onchange="loadFile(1, this)">
    </div>
    <div class="upload-box" id="box2" onclick="document.getElementById('f2').click()">
      <label>전환유형별 데이터</label>
      <div class="filename" id="name2">파일을 클릭해 선택</div>
      <div class="hint" id="hint2">전환 유형 컬럼 포함 (구매완료/장바구니 담기)</div>
      <input type="file" id="f2" accept=".csv" onchange="loadFile(2, this)">
    </div>
  </div>

  <button class="run-btn" id="runBtn" disabled onclick="run()">보정 실행</button>

  <div class="result-box" id="resultBox" style="display:none;"></div>
</div>

<script>
let files = { 1: null, 2: null };

function loadFile(n, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    files[n] = { name: file.name, content: e.target.result };
    document.getElementById('name' + n).textContent = file.name;
    document.getElementById('hint' + n).textContent = '업로드 완료';
    document.getElementById('box' + n).classList.add('ready');
    if (files[1] && files[2]) document.getElementById('runBtn').disabled = false;
  };
  reader.readAsText(file, 'UTF-8');
}

function parseCSV(text) {
  const bom = text.charCodeAt(0) === 0xFEFF;
  const clean = bom ? text.slice(1) : text;
  const lines = clean.split(/\r?\n/).filter(l => l.trim());
  const rows = [];
  for (const line of lines) {
    const row = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { row.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    row.push(cur.trim());
    rows.push(row);
  }
  return rows;
}

function detectHeader(rows) {
  for (let i = 0; i < rows.length; i++) {
    if (rows[i].length > 2 && rows[i].some(c => c.includes('캠페인유형') || c.includes('일별'))) return i;
  }
  return 1;
}

// 유형 파일 모드 자동 감지
// 모드A: '전환 유형' 컬럼 있음 → 구매완료만 필터 후 캠페인유형+일별 기준 합산
// 모드B: '검색 유형' 컬럼 있음 (장바구니 없는 구매 전용) → 캠페인유형+캠페인+광고그룹+일별 기준 합산
// 모드C: 전환유형 컬럼 없음 → 구매완료 데이터 그대로로 간주, 가능한 키로 매칭

function buildPurchaseMap(hdr2, data2) {
  const hasConvType = hdr2.findIndex(c => c.includes('전환 유형') || c === '전환유형');
  const hasSearchType = hdr2.findIndex(c => c.includes('검색 유형') || c === '검색유형');
  const iCampType = hdr2.findIndex(c => c === '캠페인유형');
  const iCamp = hdr2.findIndex(c => c === '캠페인');
  const iGroup = hdr2.findIndex(c => c === '광고그룹');
  const iDate = hdr2.findIndex(c => c.includes('일별'));
  const iConv = hdr2.findIndex(c => c.includes('총 전환수'));
  const iRev = hdr2.findIndex(c => c.includes('전환매출액'));

  const map = {};

  for (const row of data2) {
    // 모드A: 전환유형 컬럼 있으면 구매완료만
    if (hasConvType !== -1) {
      const ct = row[hasConvType] || '';
      if (!ct.includes('구매완료')) continue;
    }

    // 키 구성: 가능한 컬럼 조합으로 최대한 정밀하게
    const parts = [];
    if (iCampType !== -1) parts.push(row[iCampType] || '');
    if (iCamp !== -1) parts.push(row[iCamp] || '');
    if (iGroup !== -1) parts.push(row[iGroup] || '');
    if (iDate !== -1) parts.push(row[iDate] || '');
    const key = parts.join('||');

    const conv = parseInt(row[iConv]) || 0;
    const rev = parseInt(row[iRev]) || 0;

    if (!map[key]) map[key] = { conv: 0, rev: 0 };
    map[key].conv += conv;
    map[key].rev += rev;
  }

  // 키 구성에 사용한 컬럼 정보 반환 (전체 데이터 매칭에 사용)
  return { map, cols: { iCampType, iCamp, iGroup, iDate } };
}

function makeKey(row, cols) {
  const parts = [];
  if (cols.iCampType !== -1) parts.push(row[cols.iCampType] || '');
  if (cols.iCamp !== -1) parts.push(row[cols.iCamp] || '');
  if (cols.iGroup !== -1) parts.push(row[cols.iGroup] || '');
  if (cols.iDate !== -1) parts.push(row[cols.iDate] || '');
  return parts.join('||');
}

function run() {
  const rb = document.getElementById('resultBox');
  rb.style.display = 'block';
  rb.innerHTML = '<div class="msg">처리 중...</div>';

  try {
    const r1 = parseCSV(files[1].content);
    const r2 = parseCSV(files[2].content);

    const h1i = detectHeader(r1);
    const h2i = detectHeader(r2);
    const hdr1 = r1[h1i];
    const hdr2 = r2[h2i];

    const data1 = r1.slice(h1i + 1).filter(r => r.length >= 3);
    const data2 = r2.slice(h2i + 1).filter(r => r.length >= 3);

    // 전체 데이터 컬럼 인덱스
    const i1 = {
      campType: hdr1.findIndex(c => c === '캠페인유형'),
      camp: hdr1.findIndex(c => c === '캠페인'),
      group: hdr1.findIndex(c => c === '광고그룹'),
      date: hdr1.findIndex(c => c.includes('일별')),
      conv: hdr1.findIndex(c => c.includes('총 전환수')),
      rev: hdr1.findIndex(c => c.includes('전환매출액')),
      cost: hdr1.findIndex(c => c.includes('총비용')),
      roas: hdr1.findIndex(c => c.includes('광고수익률') || c.includes('ROAS')),
      cvr: hdr1.findIndex(c => c.includes('전환율'))
    };

    if (i1.conv === -1) {
      rb.innerHTML = '<div class="error-msg">전체 데이터에서 전환수 컬럼을 찾을 수 없습니다.</div>';
      return;
    }

    // 유형 데이터로 구매 맵 구성
    const { map: purchaseMap, cols } = buildPurchaseMap(hdr2, data2);

    // 전체 데이터 매칭 키 구성에 사용할 컬럼 (유형 파일 기준 cols 사용)
    // 전체 파일에서 동일 컬럼명으로 인덱스 재탐색
    const matchCols = {
      iCampType: cols.iCampType !== -1 ? i1.campType : -1,
      iCamp: cols.iCamp !== -1 ? i1.camp : -1,
      iGroup: cols.iGroup !== -1 ? i1.group : -1,
      iDate: cols.iDate !== -1 ? i1.date : -1
    };

    let changedCount = 0;
    const output = [];
    const metaRows = r1.slice(0, h1i);

    for (const row of data1) {
      const newRow = [...row];
      const key = makeKey(row, matchCols);
      const pm = purchaseMap[key];
      let changed = false;

      if (pm !== undefined) {
        const origConv = parseInt(row[i1.conv]) || 0;
        const origRev = parseInt(row[i1.rev]) || 0;
        if (origConv !== pm.conv || origRev !== pm.rev) {
          newRow[i1.conv] = pm.conv;
          if (i1.rev !== -1) newRow[i1.rev] = pm.rev;
          // ROAS 재계산
          if (i1.roas !== -1 && i1.cost !== -1) {
            const cost = parseFloat(row[i1.cost]) || 0;
            newRow[i1.roas] = cost > 0 ? ((pm.rev / cost) * 100).toFixed(2) : 0;
          }
          // 전환율 재계산
          if (i1.cvr !== -1) {
            const clicks = hdr1.findIndex(c => c.includes('클릭수'));
            const cl = clicks !== -1 ? (parseFloat(row[clicks]) || 0) : 0;
            newRow[i1.cvr] = cl > 0 ? ((pm.conv / cl) * 100).toFixed(2) : 0;
          }
          changed = true;
          changedCount++;
        }
      }
      output.push({ row: newRow, changed });
    }

    // 모드 설명
    const hasConvType = hdr2.findIndex(c => c.includes('전환 유형') || c === '전환유형') !== -1;
    const hasSearchType = hdr2.findIndex(c => c.includes('검색 유형') || c === '검색유형') !== -1;
    const modeLabel = hasConvType
      ? '모드: 전환유형 필터 (구매완료만 추출)'
      : hasSearchType
        ? '모드: 검색유형 합산 (구매 데이터 그룹 합산)'
        : '모드: 직접 매칭';

    const keyLabel = [
      cols.iCampType !== -1 ? '캠페인유형' : null,
      cols.iCamp !== -1 ? '캠페인' : null,
      cols.iGroup !== -1 ? '광고그룹' : null,
      cols.iDate !== -1 ? '일별' : null
    ].filter(Boolean).join(' + ');

    const totalOrigConv = data1.reduce((s, r) => s + (parseInt(r[i1.conv]) || 0), 0);
    const totalNewConv = output.reduce((s, o) => s + (parseInt(o.row[i1.conv]) || 0), 0);
    const totalOrigRev = i1.rev !== -1 ? data1.reduce((s, r) => s + (parseInt(r[i1.rev]) || 0), 0) : 0;
    const totalNewRev = i1.rev !== -1 ? output.reduce((s, o) => s + (parseInt(o.row[i1.rev]) || 0), 0) : 0;

    let html = '';
    html += '<div class="stats">';
    html += `<div class="stat"><div class="stat-label">보정된 행</div><div class="stat-val green">${changedCount}개</div></div>`;
    html += `<div class="stat"><div class="stat-label">전환수 변화</div><div class="stat-val ${totalNewConv < totalOrigConv ? 'red' : ''}">${totalOrigConv.toLocaleString()} → ${totalNewConv.toLocaleString()}</div></div>`;
    html += `<div class="stat"><div class="stat-label">매출액 변화 (원)</div><div class="stat-val ${totalNewRev < totalOrigRev ? 'red' : ''}">${totalOrigRev.toLocaleString()} → ${totalNewRev.toLocaleString()}</div></div>`;
    html += '</div>';
    html += `<div style="padding:8px 14px; font-size:12px; color:#666; background:#f9f9f7; border-bottom:0.5px solid #e0e0dc;">`;
    html += `<b style="color:#0F6E56">${modeLabel}</b> &nbsp;|&nbsp; 매칭 기준: ${keyLabel}</div>`;
    html += '<div class="result-header"><span>미리보기 (수정된 행 강조)</span>';
    html += '<button class="dl-btn" onclick="downloadCSV()">CSV 다운로드</button></div>';
    html += '<div class="table-wrap"><table><thead><tr>';
    for (const h of hdr1) html += `<th>${h}</th>`;
    html += '<th>변경</th></tr></thead><tbody>';
    for (const { row, changed } of output) {
      html += `<tr>`;
      for (const cell of row) html += `<td>${cell}</td>`;
      html += `<td>${changed ? '<span class="tag tag-changed">수정됨</span>' : '<span class="tag tag-same">-</span>'}</td></tr>`;
    }
    html += '</tbody></table></div>';

    rb.innerHTML = html;
    window._csvData = { metaRows, hdr1, output };

  } catch(e) {
    rb.innerHTML = `<div class="error-msg">오류: ${e.message}</div>`;
  }
}

function downloadCSV() {
  const { metaRows, hdr1, output } = window._csvData;
  const lines = [];
  for (const row of metaRows) {
    lines.push(row.map(c => String(c).includes(',') ? `"${c}"` : c).join(','));
  }
  lines.push(hdr1.map(c => String(c).includes(',') ? `"${c}"` : c).join(','));
  for (const { row } of output) {
    lines.push(row.map(c => String(c).includes(',') ? `"${c}"` : c).join(','));
  }
  const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
  const body = new TextEncoder().encode(lines.join('\r\n'));
  const blob = new Blob([bom, body], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '전체_데이터_보정완료.csv';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
}
</script>
</body>
</html>
